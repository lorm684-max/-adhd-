<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>duangduang_pet_v0.7_animation_core</title>
  <meta name="theme-color" content="#f19932" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="app">
    <section id="stage" class="stage state-idle" aria-label="杜望桌宠区域">
      <div class="ambient"></div>

      <aside class="edge-panel top-panel" data-panel="top" aria-label="顶部信息面板">
        <button class="edge-tab" data-toggle-panel="top">今日状态</button>
        <div class="panel-inner">
          <div class="panel-head">
            <div>
              <h2>杜包今天 ADHD 了吗？</h2>
              <p>V0.7：动作系统、状态机和序列帧调度已接管 duangduang。</p>
            </div>
            <span class="mini-badge" id="currentStateBadge">普通待机</span>
          </div>
          <div class="stats">
            <div class="stat"><div class="num" id="furCount">0</div><div class="label">今日狗毛</div></div>
            <div class="stat"><div class="num" id="doneCount">0</div><div class="label">完成动作</div></div>
            <div class="stat"><div class="num" id="streakCount">0</div><div class="label">启动天数</div></div>
          </div>
          <div class="section">
            <div class="section-title">杜望今日判决</div>
            <div class="report" id="report">尚未开庭。杜包先动一下，杜望再宣布判决。</div>
          </div>
        </div>
      </aside>

      <aside class="edge-panel left-panel" data-panel="left" aria-label="左侧状态面板">
        <button class="edge-tab" data-toggle-panel="left">状态</button>
        <div class="panel-inner">
          <div class="panel-head">
            <div>
              <h2>今日杜包状态</h2>
              <p>状态只改变状态机，由状态机决定基础动画、台词和任务池。</p>
            </div>
          </div>
          <div class="grid" id="stateButtons">
            <button class="btn active" data-state="idle">普通待机</button>
            <button class="btn" data-state="adhd">脑子乱飞</button>
            <button class="btn" data-state="low">低电量</button>
            <button class="btn" data-state="stuck">启动不了</button>
            <button class="btn" data-state="anxious">焦虑了</button>
            <button class="btn" data-state="smug">欠揍巡逻</button>
          </div>
          <div class="section quick-row">
            <button class="btn small blue" id="petBtn">摸摸狗</button>
            <button class="btn small" id="resetBtn">清空今日</button>
          </div>
          <div class="section">
            <button class="btn primary" id="newTaskBtnLeft">叼个任务</button>
          </div>
        </div>
      </aside>

      <aside class="edge-panel right-panel" data-panel="right" aria-label="右侧任务面板">
        <button class="edge-tab" data-toggle-panel="right">任务</button>
        <div class="panel-inner">
          <div class="panel-head">
            <div>
              <h2>杜望叼来的任务</h2>
              <p>任务完成不了就降级，不做惩罚。</p>
            </div>
          </div>
          <button class="btn primary" id="newTaskBtn">杜望，叼个任务来</button>
          <div class="section task-card">
            <div>
              <div class="task-level" id="taskLevel">暂无任务</div>
              <div class="task-text" id="taskText">先选状态，或者直接让杜望叼一个。</div>
            </div>
            <div class="task-meta">
              <span class="pill" id="taskKind">启动器</span>
              <span class="pill" id="taskRule">完成不了就降级</span>
            </div>
          </div>
          <div class="section">
            <div class="time-display" id="timeDisplay">01:00</div>
            <div class="timer-controls">
              <button class="btn small" data-timer="30">30 秒</button>
              <button class="btn small" data-timer="60">1 分钟</button>
              <button class="btn small" data-timer="180">3 分钟</button>
            </div>
            <button class="btn small" id="startTimerBtn">开始盯梢</button>
          </div>
          <div class="action-row">
            <button class="btn good" id="completeBtn">完成了</button>
            <button class="btn bad" id="failBtn">没完成，降级</button>
          </div>
        </div>
      </aside>

      <aside class="edge-panel bottom-panel" data-panel="bottom" aria-label="底部日历面板">
        <button class="edge-tab" data-toggle-panel="bottom">日历</button>
        <div class="panel-inner">
          <div class="calendar-wrap">
            <div>
              <div class="calendar-top">
                <div class="month-title" id="monthTitle"></div>
                <div class="cal-nav">
                  <button class="btn small" id="prevMonth">上月</button>
                  <button class="btn small" id="todayMonth">今天</button>
                  <button class="btn small" id="nextMonth">下月</button>
                </div>
              </div>
              <div class="calendar-grid" id="calendarGrid"></div>
            </div>
            <div class="day-detail" id="dayDetail"></div>
          </div>
        </div>
      </aside>

      <div class="stage-title">
        <h1>duangduang</h1>
        <p>v0.7 animation core</p>
      </div>

      <div id="bubble" class="bubble">杜包，今天是脑子乱飞，还是灵魂下班？先选一个状态，我叼个低配任务来。</div>
      <div class="floaters" id="floaters"></div>
      <div class="shadow-blob" aria-hidden="true"></div>

      <div id="petWrap" class="pet-wrap" role="button" tabindex="0" aria-label="杜望小柯基，可点击和拖动">
        <div class="pet-aura" aria-hidden="true"></div>
        <img id="petImg" class="pet" src="assets/duangduang/idle.png" alt="duangduang 桌宠" />
        <div class="pet-fx fx-sleep" aria-hidden="true"><span>Z</span><span>Z</span><span>Z</span></div>
        <div class="pet-fx fx-happy" aria-hidden="true"><span>★</span><span>✦</span><span>★</span></div>
        <div class="pet-fx fx-task" aria-hidden="true"><span>📄</span><span>!</span></div>
        <div class="pet-fx fx-low" aria-hidden="true"><span>.</span><span>.</span><span>.</span></div>
        <div class="pet-fx fx-adhd" aria-hidden="true"><span>?</span><span>!</span><span>✦</span></div>
      </div>
    </section>

    <nav class="mobile-dock" aria-label="手机版快捷操作">
      <button class="dock-btn" data-mobile-panel="left" type="button"><span>状态</span></button>
      <button class="dock-btn" data-mobile-panel="right" type="button"><span>任务</span></button>
      <button class="dock-btn dock-primary" id="mobilePetBtn" type="button"><span>摸摸</span></button>
      <button class="dock-btn" data-mobile-panel="top" type="button"><span>今日</span></button>
      <button class="dock-btn" data-mobile-panel="bottom" type="button"><span>日历</span></button>
    </nav>

    <button class="mobile-scrim" id="mobileScrim" type="button" aria-label="关闭面板"></button>
  </main>

  <script src="src/lines.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/animations.js"></script>
  <script src="src/state.js"></script>
  <script src="src/calendar.js"></script>
  <script src="src/tasks.js"></script>
  <script src="src/behavior.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
